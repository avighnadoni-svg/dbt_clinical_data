name: dbt CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  dbt-ci:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./include/dbt/dbt_clinical_data

    env:
      DBT_ACCOUNT: ${{ secrets.DBT_ACCOUNT }}
      DBT_USER: ${{ secrets.DBT_USER }}
      DBT_PASSWORD: ${{ secrets.DBT_PASSWORD }}
      DBT_ROLE: ${{ secrets.DBT_ROLE }}
      DBT_DATABASE: ${{ secrets.DBT_DATABASE }}
      DBT_WAREHOUSE: ${{ secrets.DBT_WAREHOUSE }}
      DBT_SCHEMA: ${{ secrets.DBT_SCHEMA }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dbt
        run: |
          python -m pip install --upgrade pip
          pip install dbt-core==1.11.8 dbt-snowflake==1.11.4

      - name: dbt deps
        run: dbt deps --profiles-dir ../profiles

      - name: dbt debug
        run: dbt debug --profiles-dir ../profiles

      - name: dbt parse
        run: dbt parse --profiles-dir ../profiles

      - name: dbt test
        run: dbt test --profiles-dir ../profiles